name: Daily scrape

# 平日 18:00 JST（= 09:00 UTC）に note から最新の出勤服を取得する。
# 新着があれば src/data を更新コミットし、デプロイを起動して公開サイトを更新する。
# 手動実行も可（Actions タブの Run workflow）。
on:
  schedule:
    - cron: '0 9 * * 1-5' # 月〜金のみ
  workflow_dispatch:

permissions:
  contents: write # データ更新のコミット/プッシュ
  actions: write # deploy ワークフローの起動

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # バージョンは package.json の packageManager を参照
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # 取得済み記事のキャッシュを跨いで持ち越し、新着分だけ取りにいく
      - uses: actions/cache@v4
        with:
          path: .cache
          key: scrape-cache-${{ github.run_id }}
          restore-keys: scrape-cache-

      - name: Scrape note + weather
        run: pnpm scrape

      - name: Commit & deploy if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$(git status --porcelain src/data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data
            git commit -m "chore: daily scrape ($(TZ=Asia/Tokyo date +%Y-%m-%d))"
            git push
            gh workflow run deploy.yml   # GITHUB_TOKEN の push は deploy を自動起動しないため明示
            echo "✓ 新着を取り込み、デプロイを起動しました"
          else
            echo "新着なし。更新もデプロイもスキップ"
          fi
